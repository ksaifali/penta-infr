<nav class="navbar" [class.scrolled]="scrolled" [class.navbar--solid]="solid">
  <a routerLink="/" class="navbar__logo">
    <div class="navbar__logo-mark" [style.background]="goldLogo ? 'var(--gold)' : 'var(--accent)'">P</div>
    <div class="navbar__logo-text">
      <span>PENTA</span>
      <span>FREIGHT PVT. LTD.</span>
    </div>
  </a>
  <div class="navbar__nav">
    <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{exact:true}" class="navbar__link">Home</a>
    <a routerLink="/services" routerLinkActive="active" class="navbar__link">Services</a>
    <a routerLink="/industries" routerLinkActive="active" class="navbar__link">Industries</a>
    <a routerLink="/pentakuhl" routerLinkActive="active" class="navbar__link">PentaKühl</a>
    <a routerLink="/" fragment="about" class="navbar__link">About</a>
    <a routerLink="/" fragment="contact" class="navbar__link navbar__cta"
       [style.background]="goldLogo ? 'var(--gold)' : null"
       [style.color]="goldLogo ? 'var(--navy)' : null">Enquire Now</a>
  </div>
  <div class="navbar__hamburger" (click)="toggleMenu()">
    <span [style.transform]="menuOpen() ? 'rotate(45deg) translate(5px,5px)' : ''"></span>
    <span [style.opacity]="menuOpen() ? '0' : '1'"></span>
    <span [style.transform]="menuOpen() ? 'rotate(-45deg) translate(5px,-5px)' : ''"></span>
  </div>
</nav>

<div class="navbar__mobile-menu" [class.open]="menuOpen()">
  <a routerLink="/" (click)="closeMenu()">Home</a>
  <a routerLink="/services" (click)="closeMenu()">Services</a>
  <a routerLink="/industries" (click)="closeMenu()">Industries</a>
  <a routerLink="/pentakuhl" (click)="closeMenu()">PentaKühl</a>
  <a routerLink="/" fragment="about" (click)="closeMenu()">About</a>
  <a routerLink="/" fragment="contact" (click)="closeMenu()"
     [style.color]="goldLogo ? 'var(--gold)' : 'var(--accent)'">Enquire Now →</a>
</div>
